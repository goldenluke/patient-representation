<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Artigo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<style>

body{
    margin:0;
    background:#ececec;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

#container{

    max-width:960px;

    margin:40px auto;

    background:white;

    padding:60px;

    border-radius:12px;

    box-shadow:0 5px 25px rgba(0,0,0,.08);
}

.markdown-body{

    background:white;
}

.markdown-body h1{

    border-bottom:none;

    padding-bottom:0;
}

.markdown-body img{

    max-width:100%;
}

.markdown-body table{

    width:100%;
}

.katex-display{

    overflow-x:auto;

    overflow-y:hidden;

    margin:2rem 0;
}

.loading{

    text-align:center;

    color:#666;

    font-size:18px;

    padding:100px;
}

.error{

    color:#d00;

    white-space:pre-wrap;

    font-family:monospace;
}

</style>

</head>

<body>

<div id="container">

<div id="content" class="markdown-body">

<div class="loading">
Carregando artigo...
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath/texmath.min.js"></script>

<script>

const md = window.markdownit({

    html:true,

    linkify:true,

    typographer:true

}).use(texmath,{

    engine:katex,

    delimiters:"dollars",

    katexOptions:{

        throwOnError:false,

        strict:false

    }

});

async function carregar(){

    try{

        const response = await fetch("text.md");

        if(!response.ok){

            throw new Error("Não foi possível carregar text.md");
        }

        const markdown = await response.text();

        document.getElementById("content").innerHTML = md.render(markdown);

    }

    catch(e){

        document.getElementById("content").innerHTML =

        '<div class="error">'+e+'</div>';

    }

}

carregar();

</script>

</body>
</html>
