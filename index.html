<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Artigo</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<style>

body{
    background:#f5f5f5;
}

.markdown-body{

    max-width:900px;

    margin:auto;

    background:white;

    padding:60px;

    border-radius:16px;

    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.katex-display{

    overflow-x:auto;
}

</style>

</head>

<body class="py-12">

<article
id="content"
class="markdown-body">

Carregando artigo...

</article>

<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/markdown-it-texmath/texmath.min.js"></script>

<script>

const md = window.markdownit({

html:true,

linkify:true,

typographer:true

})

.use(texmath,{

engine:katex,

delimiters:"dollars",

katexOptions:{

throwOnError:false,

strict:false

}

});

async function carregar(){

    try{

        const response = await fetch("./text.md");

        if(!response.ok){

            throw new Error(response.status);
        }

        const markdown = await response.text();

        document.getElementById("content").innerHTML = md.render(markdown);

    }

    catch(e){

        document.getElementById("content").innerHTML = `
            <h2>Erro</h2>
            <p>Não foi possível carregar <strong>text.md</strong>.</p>
            <p>Se estiver testando localmente, execute um servidor HTTP.</p>
            <pre>${e}</pre>
        `;

    }

}

carregar();

</script>

</body>

</html>
