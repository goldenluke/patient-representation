<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artigo</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<style>
body{
    margin:0;
    background:#efefef;
    color:#222;
    font-family:Georgia,serif;
}
#container{
    max-width:950px;
    margin:40px auto;
    background:#fff;
    padding:60px;
    box-shadow:0 8px 25px rgba(0,0,0,.08);
    border-radius:10px;
}
h1,h2,h3,h4{
    color:#111;
    margin-top:2em;
}
p,li{
    line-height:1.8;
    text-align:justify;
}
pre{
    background:#f6f6f6;
    padding:1rem;
    overflow:auto;
    border-radius:8px;
}
code{
    font-family:Consolas,monospace;
}
blockquote{
    border-left:4px solid #bbb;
    padding-left:1rem;
    color:#555;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:.5rem;
}
img{max-width:100%}
.katex-display{
    overflow-x:auto;
    margin:1.5rem 0;
}
#error{color:#b00020;white-space:pre-wrap}
</style>
</head>
<body>

<div id="container">
<div id="content">Carregando artigo...</div>
</div>

<script>
window.MathJax = {
  tex: {
    inlineMath: [['$','$']],
    displayMath: [['$$','$$']],
    processEscapes: true
  },
  svg: {
    fontCache: 'global'
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<script>
const md = window.markdownit({
    html:true,
    linkify:true,
    typographer:true
});

async function carregar(){

    try{

        const response = await fetch("./text.md");

        if(!response.ok){
            throw new Error("Não foi possível carregar text.md");
        }

        const markdown = await response.text();

        const area = document.getElementById("content");
        area.innerHTML = md.render(markdown);

        if(window.MathJax){
            await MathJax.typesetPromise([area]);
        }

    }catch(e){

        document.getElementById("content").innerHTML =
        "<h2>Erro</h2><div id='error'>"+e+"</div><p>Se estiver abrindo pelo file://, publique no GitHub Pages ou execute um servidor HTTP local.</p>";

    }

}

window.addEventListener("load",carregar);
</script>

</body>
</html>
