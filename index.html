<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fundamentos Matemáticos da Representação Computacional de Sistemas Biológicos - Um Meta-Modelo para Medicina Computacional de Precisão</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">

<style>
body{margin:0;background:#efefef;color:#222;font-family:Georgia,serif}
#content{max-width:900px;margin:40px auto;background:#fff;padding:60px;
box-shadow:0 8px 24px rgba(0,0,0,.08);border-radius:10px}
h1,h2,h3{margin-top:2em}
p,li{line-height:1.8;text-align:justify}
pre{background:#f6f6f6;padding:1rem;border-radius:6px;overflow:auto}
code{font-family:Consolas,monospace}
blockquote{border-left:4px solid #bbb;padding-left:1rem;color:#555}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ddd;padding:.5rem}
img{max-width:100%}
.MathJax_Display,.mjx-container{overflow-x:auto}
</style>

<script>
window.MathJax={
 tex:{
  inlineMath:[['$','$']],
  displayMath:[['$$','$$']],
  processEscapes:true
 },
 svg:{fontCache:'global'}
};
</script>

<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>
<body>

<div id="content">Carregando...</div>

<script>

async function carregar(){

 const r=await fetch("text.md");
 const original=await r.text();

 let texto=original;
 const blocos=[];

 texto=texto.replace(/\$\$([\s\S]*?)\$\$/g,function(m){
    const id=blocos.length;
    blocos.push(m);
    return "@@MATH"+id+"@@";
 });

 texto=texto.replace(/\$(?!\$)([^\n]+?)(?<!\$)\$/g,function(m){
    const id=blocos.length;
    blocos.push(m);
    return "@@MATH"+id+"@@";
 });

 let html=marked.parse(texto);

 html=html.replace(/@@MATH(\d+)@@/g,function(_,i){
    return blocos[Number(i)];
 });

 const area=document.getElementById("content");
 area.innerHTML=html;

 await MathJax.typesetPromise([area]);

}

carregar().catch(e=>{
 document.getElementById("content").innerHTML="<h2>Erro</h2><pre>"+e+"</pre>";
});

</script>

</body>
</html>
